name: 美股分析

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 22:30 开盘 (UTC+8)
    - cron: '30 22 * * 1-5'   # 06:30 收盘 (UTC+8)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          STOCK_LIST: 'MSFT,NVDA,AAPL,GOOGL,AMZN,AMD,INTC,TSLA,NFLX,META,BILI,PDD'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
        run: python main.py --stocks $STOCK_LIST
