name: A股分析

on:
  schedule:
    - cron: '0 2 * * 1-5'     # 开盘预览 10:00 北京时间
    - cron: '30 7 * * 1-5'    # 收盘分析 15:30 北京时间
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: A股分析
        env:
          STOCK_LIST: '601398,600036,002594,300750,688981,688256,600519'
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "02" ]; then
            python main.py --stocks $STOCK_LIST --no-market-review
          else
            python main.py --stocks $STOCK_LIST
          fi
