name: 港股分析

on:
  schedule:
    - cron: '0 2 * * 1-5'     # 10:00 开盘
    - cron: '30 8 * * 1-5'    # 16:30 收盘
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          STOCK_LIST: 'hk01810,hk00700,hk09988'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
        run: python main.py --stocks $STOCK_LIST --no-market-review
